{% extends 'detection/base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 2rem; text-align: center;">Welcome Back</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-light);">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div style="color: #ef4444; font-size: 0.875rem; margin-top: 0.25rem;">{{ field.errors }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">
                Login to Dashboard
            </button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; color: var(--text-light);">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary);">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
